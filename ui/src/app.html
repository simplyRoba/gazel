<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#FAF7F2"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1A2030"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icon-180.png"
    />
    <script>
      (function () {
        var stored = localStorage.getItem("gazel.theme");
        // Explicit light/dark overrides system. "system" or absent/unknown
        // falls through to OS preference detection via matchMedia.
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
