<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gazel</title>
    <meta name="description" content="Fuel expense and mileage tracker" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no, date=no, address=no" />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icon-180.png"
    />
    <script>
      (() => {
        const storageKey = "gazel.theme";
        const valid = new Set(["light", "dark", "system"]);
        let preference = "system";
        try {
          const stored = localStorage.getItem(storageKey);
          if (valid.has(stored)) preference = stored;
        } catch {
          // Ignore storage failures.
        }
        const supportsMatchMedia =
          typeof window !== "undefined" &&
          typeof window.matchMedia === "function";
        const prefersDark =
          supportsMatchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved =
          preference === "system"
            ? prefersDark
              ? "dark"
              : "light"
            : preference;
        document.documentElement.dataset.theme = resolved;
        const m = document.createElement("meta");
        m.name = "theme-color";
        m.content = resolved === "dark" ? "#1A2030" : "#FAF7F2";
        document.head.appendChild(m);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
